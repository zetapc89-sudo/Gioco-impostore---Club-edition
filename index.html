<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Impostore - Club Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap');
        
        body { 
            font-family: 'Lora', serif; 
            background-color: #120905; 
            color: #f4ece1; 
        }
        h1, h2, h3, .font-display {
            font-family: 'Cinzel', serif;
        }
        /* Estetica carta pergamena antica per i ruoli */
        .parchment-card { 
            background: #f4efe2; 
            color: #1c120c;
            border: 2px solid #d4af37;
            border-radius: 0.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9), inset 0 0 40px rgba(212, 175, 55, 0.15);
        }
        /* Scatola del gioco principale */
        .cabinet-box {
            background: #1c0f0a;
            border: 1px solid #3d251a;
            border-radius: 0.75rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .hidden-content { 
            filter: blur(40px); 
            transition: filter 0.3s ease; 
            cursor: pointer; 
            user-select: none; 
            -webkit-user-select: none; 
        }
        .hidden-content.revealed { 
            filter: blur(0); 
        }
        .transition-overlay { 
            background-color: #120905; 
            position: absolute; 
            inset: 0; 
            z-index: 50; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 2rem; 
        }
        .role-badge { 
            padding: 6px 16px; 
            border-radius: 4px; 
            font-size: 0.75rem; 
            font-weight: 800; 
            letter-spacing: 0.15em; 
            text-transform: uppercase; 
            display: inline-block;
            border: 1px solid currentColor;
            font-family: 'Cinzel', serif;
        }
        .bg-civil { color: #2c5282; border-color: #2c5282; }
        .bg-impostor { color: #9b2c2c; border-color: #9b2c2c; }
        .bg-white { color: #744210; border-color: #744210; }
        
        /* Input stile scrittoio antico */
        .wood-input {
            background-color: #0e0704;
            border: 1px solid #4a2f22;
            color: #f4ece1;
            transition: all 0.2s;
        }
        .wood-input:focus {
            border-color: #d4af37;
            background-color: #120905;
        }
    </style>
</head>
<body class="p-4 min-h-screen flex items-center justify-center bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#2a170f] via-[#120905] to-black pb-36">

    <div id="game-container" class="w-full max-w-md cabinet-box p-6 md:p-8 relative overflow-hidden min-h-[580px] mb-8 flex flex-col justify-between">
        
        <!-- Schermata Transizione (Passaggio di mano) -->
        <div id="transition-screen" class="hidden transition-overlay">
            <div class="text-center">
                <p class="text-[#d4af37]/60 uppercase tracking-[0.2em] text-[10px] mb-3 font-semibold font-display">Passaggio di Mano</p>
                <div class="h-[1px] w-12 bg-[#4a2f22] mx-auto mb-8"></div>
                <p class="text-xs text-slate-400 mb-2 italic">Consegna il dispositivo a</p>
                <div id="next-target-name" class="text-3xl font-extrabold text-[#f4ece1] mb-12 uppercase tracking-wide font-display"></div>
            </div>
            <button onclick="revealForPlayer()" class="w-full py-4 bg-[#7a2214] hover:bg-[#992d1b] text-[#f4ece1] rounded font-bold uppercase text-xs tracking-widest active:scale-95 transition-all shadow-lg border border-[#b91c1c]/40 font-display">
                Sono io, Svela Ruolo
            </button>
        </div>

        <!-- Schermata Iniziale: Setup -->
        <div id="setup-screen" class="flex flex-col justify-between h-full flex-1">
            <div>
                <h1 class="text-3xl font-bold mb-1 tracking-tight text-center text-[#d4af37] font-display">
                    L'Impostore
                </h1>
                <p class="mb-4 text-[#8c6d53] text-center text-[10px] uppercase tracking-[0.2em] font-semibold italic">
                    Edizione da Salotto
                </p>

                <!-- Selettore Numero Giocatori (4 - 8) -->
                <div class="mb-4">
                    <label class="block text-xs font-bold text-[#8c6d53] uppercase tracking-wider mb-2 text-center font-display">Numero di Invitati</label>
                    <div class="flex justify-between bg-[#0e0704] p-1 rounded border border-[#3d251a]">
                        <button onclick="setPlayerCount(4)" id="btn-count-4" class="flex-1 py-2 text-xs font-bold rounded transition-all text-slate-400 font-display">4</button>
                        <button onclick="setPlayerCount(5)" id="btn-count-5" class="flex-1 py-2 text-xs font-bold rounded transition-all text-slate-400 font-display">5</button>
                        <button onclick="setPlayerCount(6)" id="btn-count-6" class="flex-1 py-2 text-xs font-bold rounded transition-all text-slate-400 font-display">6</button>
                        <button onclick="setPlayerCount(7)" id="btn-count-7" class="flex-1 py-2 text-xs font-bold rounded transition-all text-slate-400 font-display">7</button>
                        <button onclick="setPlayerCount(8)" id="btn-count-8" class="flex-1 py-2 text-xs font-bold rounded transition-all text-slate-400 font-display">8</button>
                    </div>
                </div>

                <!-- Selettore Difficoltà -->
                <div class="mb-5">
                    <label class="block text-xs font-bold text-[#8c6d53] uppercase tracking-wider mb-2 text-center font-display">Difficoltà indizi</label>
                    <div class="flex justify-between bg-[#0e0704] p-1 rounded border border-[#3d251a]">
                        <button onclick="setDifficulty('easy')" id="btn-diff-easy" class="flex-1 py-2 text-[10px] font-bold rounded transition-all text-slate-400 font-display">FACILE</button>
                        <button onclick="setDifficulty('medium')" id="btn-diff-medium" class="flex-1 py-2 text-[10px] font-bold rounded transition-all text-slate-400 font-display">NORMALE</button>
                        <button onclick="setDifficulty('hard')" id="btn-diff-hard" class="flex-1 py-2 text-[10px] font-bold rounded transition-all text-slate-400 font-display">DIFFICILE</button>
                    </div>
                </div>

                <!-- Input Nomi Giocatori -->
                <div class="space-y-2 max-h-[160px] overflow-y-auto pr-1" id="name-inputs">
                    <!-- Generati Dinamicamente -->
                </div>
            </div>

            <button onclick="startGame()" class="w-full mt-6 py-4 bg-[#d4af37] hover:bg-[#e5c158] text-[#120905] rounded font-bold uppercase text-xs tracking-widest transition-all shadow-md font-display">
                Distribuisci i Ruoli
            </button>
        </div>

        <!-- Schermata di Svelamento Ruoli -->
        <div id="role-screen" class="hidden flex-1 flex flex-col justify-between">
            <div class="text-center">
                <p id="player-name-turn" class="text-3xl font-extrabold mb-1 text-[#f4ece1] tracking-tight font-display uppercase"></p>
                <p class="text-[10px] text-[#8c6d53] uppercase tracking-widest mb-6 italic">Il tuo destino</p>
                
                <!-- Card Pergamena per il Ruolo -->
                <div id="word-box" class="p-8 parchment-card hidden-content flex flex-col items-center justify-center min-h-[180px] mb-2" onclick="toggleWordBlur()">
                    <div id="role-label-container" class="mb-4"></div>
                    <div id="secret-word-content" class="text-center font-serif"></div>
                </div>
            </div>

            <div class="mt-4 text-center">
                <p class="text-[10px] text-slate-500 mb-4 italic">Tocca la carta per svelare l'inchiostro segreto</p>
                <button onclick="prepareTransition()" class="w-full py-4 bg-[#1c0f0a] hover:bg-[#2c1a12] text-[#d4af37] rounded font-bold text-xs uppercase tracking-widest border border-[#4a2f22] transition-colors font-display">
                    Ho Memorizzato, Copri Carta
                </button>
            </div>
        </div>

        <!-- Schermata Gioco Attivo -->
        <div id="play-screen" class="hidden text-center flex-1 flex flex-col justify-between">
            <div>
                <h2 class="text-xl font-bold mb-6 uppercase tracking-[0.15em] text-[#d4af37] font-display">Tavolo delle Votazioni</h2>
                <div id="alive-players" class="space-y-2 max-h-[280px] overflow-y-auto pr-1 text-left"></div>
            </div>
            
            <div id="game-status" class="mt-6 p-4 bg-[#0e0704] border border-[#3d251a] rounded">
                <p id="status-text" class="text-[#8c6d53] text-xs italic">Iniziate il giro di parole. Chi sembra fuori posto?</p>
            </div>
        </div>

        <!-- Schermata Finale -->
        <div id="end-screen" class="hidden text-center flex-1 flex flex-col justify-center items-center">
            <div class="w-16 h-16 bg-[#0e0704] border border-[#3d251a] rounded-full flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-[#d4af37]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 id="winner-title" class="text-3xl font-extrabold mb-2 text-[#d4af37] uppercase tracking-tight font-display"></h1>
            <p id="winner-desc" class="text-sm text-slate-400 mb-10 max-w-xs italic"></p>
            <button onclick="resetGame()" class="w-full py-4 bg-[#d4af37] hover:bg-[#e5c158] text-[#120905] rounded font-bold uppercase text-xs tracking-widest transition-all font-display">
                Ritorna al Salotto
            </button>
        </div>
    </div>

    <script>

                { main: "Frankenstein",hint: "Ginevra" },
                { main: "Titanic",     hint: "Southampton" },
                { main: "Pompei",      hint: "Plinio" },
                { main: "Atlantide",   hint: "Platone" },
                { main: "Marathon",    hint: "Filippide" },
                { main: "Bastiglia",   hint: "1789" }
            ]

        let players = [];
        let currentPlayerIndex = 0;
        let gameData = { word: {} };
        let activePlayerCount = 6; 
        let currentDifficulty = 'medium'; // Default iniziale di sistema

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Distribuzione dinamica dei ruoli per il range 4-8 persone
        function getRolesDistribution(count) {
            switch(count) {
                case 4:
                    return ['Civil', 'Civil', 'Impostore', 'MrWhite'];
                case 5:
                    return ['Civil', 'Civil', 'Civil', 'Impostore', 'MrWhite'];
                case 6:
                    return ['Civil', 'Civil', 'Civil', 'Civil', 'Impostore', 'MrWhite'];
                case 7:
                    return ['Civil', 'Civil', 'Civil', 'Civil', 'Civil', 'Impostore', 'MrWhite'];
                case 8:
                    return ['Civil', 'Civil', 'Civil', 'Civil', 'Civil', 'Civil', 'Impostore', 'MrWhite'];
                default:
                    return ['Civil', 'Civil', 'Civil', 'Civil', 'Impostore', 'MrWhite'];
            }
        }

        function setPlayerCount(count) {
            activePlayerCount = count;
            for (let i = 4; i <= 8; i++) {
                const btn = document.getElementById(`btn-count-${i}`);
                if (i === count) {
                    btn.classList.add('bg-[#d4af37]', 'text-[#120905]');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('bg-[#d4af37]', 'text-[#120905]');
                    btn.classList.add('text-slate-400');
                }
            }
            renderNameInputs(count);
        }

        function setDifficulty(difficulty) {
            currentDifficulty = difficulty;
            const diffs = ['easy', 'medium', 'hard'];
            diffs.forEach(d => {
                const btn = document.getElementById(`btn-diff-${d}`);
                if (d === difficulty) {
                    btn.classList.add('bg-[#d4af37]', 'text-[#120905]');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.remove('bg-[#d4af37]', 'text-[#120905]');
                    btn.classList.add('text-slate-400');
                }
            });
        }

        function renderNameInputs(count) {
            const container = document.getElementById('name-inputs');
            container.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                container.innerHTML += `
                    <div class="flex items-center space-x-3 bg-[#0e0704] border border-[#3d251a] rounded px-4 py-2">
                        <span class="text-[#8c6d53] text-[10px] font-bold font-mono">#${i}</span>
                        <input type="text" id="p${i}" value="Invitato ${i}" 
                        class="w-full bg-transparent text-sm text-[#f4ece1] font-bold outline-none border-none focus:ring-0">
                    </div>
                `;
            }
        }

        function startGame() {
            players = [];
            for (let i = 1; i <= activePlayerCount; i++) {
                const name = document.getElementById(`p${i}`).value || `G${i}`;
                players.push({ id: i, name: name, role: '', alive: true });
            }
            
            // Estrazione della parola dal database basandosi sulla difficoltà selezionata
            const selectedList = wordsDatabase[currentDifficulty];
            gameData.word = selectedList[Math.floor(Math.random() * selectedList.length)];
            
            let roles = getRolesDistribution(activePlayerCount);
            roles = shuffleArray(roles); 

            players.forEach((p, idx) => { p.role = roles[idx]; });
            currentPlayerIndex = 0;
            prepareTransition();
        }

        function prepareTransition() {
            if (currentPlayerIndex >= players.length) {
                showPlayScreen();
                return;
            }
            
            const wordBox = document.getElementById('word-box');
            wordBox.classList.add('hidden-content');
            wordBox.classList.remove('revealed');

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById('transition-screen').classList.remove('hidden');
            document.getElementById('next-target-name').innerText = players[currentPlayerIndex].name;
        }

        function revealForPlayer() {
            document.getElementById('transition-screen').classList.add('hidden');
            document.getElementById('role-screen').classList.remove('hidden');
            
            const player = players[currentPlayerIndex];
            document.getElementById('player-name-turn').innerText = player.name;
            const content = document.getElementById('secret-word-content');
            const labelContainer = document.getElementById('role-label-container');
            
            if (player.role === 'Civil') {
                labelContainer.innerHTML = `<span class="role-badge bg-civil">CIVILE</span>`;
                content.innerHTML = `<p class="text-[11px] text-[#5c4a3c] mb-2 uppercase font-bold tracking-widest">La tua Parola:</p><p class="text-3xl font-black text-[#1c120c] uppercase tracking-wide">${gameData.word.main}</p>`;
            } else if (player.role === 'Impostore') {
                labelContainer.innerHTML = `<span class="role-badge bg-impostor">IMPOSTORE</span>`;
                content.innerHTML = `<p class="text-[11px] text-[#5c4a3c] mb-2 uppercase font-bold tracking-widest">Il tuo indizio:</p><p class="text-3xl font-black text-[#1c120c] uppercase tracking-wide">${gameData.word.hint}</p>`;
            } else {
                labelContainer.innerHTML = `<span class="role-badge bg-white">MR. WHITE</span>`;
                content.innerHTML = `<p class="text-[11px] text-[#5c4a3c] mb-2 uppercase font-bold tracking-widest">Infiltrazione:</p><p class="text-2xl font-black text-[#1c120c] uppercase tracking-tight">NON SAI NULLA</p><p class="mt-3 text-[10px] text-[#5c4a3c] italic">Ascolta con attenzione gli altri.</p>`;
            }
            currentPlayerIndex++;
        }

        function toggleWordBlur() {
            const wordBox = document.getElementById('word-box');
            wordBox.classList.toggle('revealed');
            wordBox.classList.toggle('hidden-content');
        }

        function showPlayScreen() {
            document.getElementById('role-screen').classList.add('hidden');
            document.getElementById('transition-screen').classList.add('hidden');
            document.getElementById('play-screen').classList.remove('hidden');
            renderAlivePlayers();
        }

        function renderAlivePlayers() {
            const container = document.getElementById('alive-players');
            container.innerHTML = '';
            players.filter(p => p.alive).forEach(p => {
                container.innerHTML += `
                    <div class="flex items-center justify-between p-4 bg-[#0e0704] border border-[#3d251a] rounded shadow-md transition-all hover:border-[#5c3c2e]">
                        <span class="font-bold text-sm text-[#f4ece1] uppercase">${p.name}</span>
                        <button onclick="eliminatePlayer(${p.id})" class="text-[9px] text-[#8c6d53] font-bold uppercase hover:text-[#f4ece1] hover:bg-[#7a2214] px-4 py-2 rounded border border-[#3d251a] transition-all">Elimina</button>
                    </div>
                `;
            });
            checkWinCondition();
        }

        function eliminatePlayer(id) {
            const player = players.find(p => p.id === id);
            player.alive = false;
            let roleLabel = '';
            if (player.role === 'Civil') roleLabel = 'CIVILE';
            else if (player.role === 'Impostore') roleLabel = 'IMPOSTORE';
            else roleLabel = 'MR. WHITE';

            document.getElementById('status-text').innerHTML = `<strong>${player.name}</strong> è fuori. Era <span class="text-[#d4af37] font-bold font-display">${roleLabel}</span>.`;
            renderAlivePlayers();
        }

        function checkWinCondition() {
            const alive = players.filter(p => p.alive);
            const impAlive = alive.some(p => p.role === 'Impostore');
            const whiteAlive = alive.some(p => p.role === 'MrWhite');
            
            if (!impAlive && !whiteAlive) {
                endGame("ORDINE RIPRISTINATO", "Tutti gli infiltrati sono stati eliminati prima che potessero distruggere la squadra.");
            } else if (alive.length <= 2) {
                endGame("SABOTAGGIO COMPLETO", "L'Impostore o Mr. White hanno preso il controllo del tavolo.");
            }
        }

        function endGame(title, desc) {
            document.getElementById('play-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('winner-title').innerText = title;
            document.getElementById('winner-desc').innerText = desc;
        }

        function resetGame() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            setPlayerCount(activePlayerCount); 
            setDifficulty(currentDifficulty);
        }

        // Setup iniziale di partenza
        setPlayerCount(6);
        setDifficulty('medium');
    </script>
</body>
</html>
